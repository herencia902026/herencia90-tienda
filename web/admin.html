<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herencia 90 | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f4f4;
            --text: #333;
            --gold: #D9C391;
            --header-bg: #111;
            --danger: #dc3545;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { background: var(--header-bg); color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
        header h2 { font-size: 1.1rem; }
        .btn-save { background: var(--gold); color: #111; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 15px; font-family: 'Montserrat', sans-serif; }
        .btn-save:hover { background: #f0d9a0; }
        .btn-add { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-bottom: 25px; font-weight: bold; font-family: 'Montserrat', sans-serif; }
        .btn-danger { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-family: 'Montserrat', sans-serif; }
        .container { max-width: 1500px; margin: 30px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .category-section { margin-bottom: 50px; overflow-x: auto; }
        h3 { border-bottom: 2px solid var(--gold); padding-bottom: 10px; color: var(--header-bg); text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; min-width: 1100px; }
        th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #ddd; vertical-align: top; }
        th { background: #eee; font-size: 12px; text-transform: uppercase; }
        input[type="number"], input[type="text"], select, textarea {
            width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px;
            font-family: 'Montserrat', sans-serif; font-size: 12px;
        }
        textarea { resize: vertical; min-height: 70px; }
        .stock-input { width: 50px !important; text-align: center; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #4CAF50; color: white; padding: 15px; border-radius: 5px; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2); font-weight: bold; z-index: 9999; }
        .photo-list { list-style: none; padding: 0; margin: 0 0 8px 0; font-size: 11px; }
        .photo-list li { background: #f9f9f9; padding: 3px 6px; margin-bottom: 3px; border-radius: 3px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ddd; }
        .remove-img { color: red; font-weight: bold; cursor: pointer; padding: 0 5px; }
        .file-upload-lbl { display: inline-block; background: #eee; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; border: 1px solid #ccc; }
        .file-upload-lbl:hover { background: #ddd; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <header>
        <h2>Panel de Inventario — Herencia 90</h2>
        <button class="btn-save" onclick="saveData()">Guardar Cambios</button>
    </header>

    <div class="container">
        <button class="btn-add" onclick="addProduct()">+ Añadir Nuevo Producto</button>
        <div id="tablesContainer"></div>
    </div>

    <div id="toast" class="toast">¡Cambios guardados exitosamente!</div>

    <script>
        let productData = [];
        const CATEGORIAS = ['Clubes 25/26', 'Selecciones', 'Retros', 'Femenino'];

        fetch('/productos.json?v=' + Date.now())
            .then(r => r.json())
            .then(data => { productData = data; renderTables(); })
            .catch(() => alert('Error cargando inventario.'));

        function renderTables() {
            const container = document.getElementById('tablesContainer');
            container.innerHTML = '';

            const grouped = {};
            CATEGORIAS.forEach(cat => grouped[cat] = []);
            productData.forEach((p, idx) => {
                const cat = p.categoria || 'Clubes 25/26';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push({ product: p, globalIndex: idx });
            });

            CATEGORIAS.forEach(cat => {
                const items = grouped[cat];
                if (items.length === 0) return;

                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `<h3>${cat} (${items.length})</h3>`;

                const table = document.createElement('table');
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th style="width:40px">ID</th>
                            <th style="width:110px">Categoría</th>
                            <th style="width:160px">Equipo / Referencia</th>
                            <th style="width:90px">Precio (COP)</th>
                            <th style="width:50px">S</th>
                            <th style="width:50px">M</th>
                            <th style="width:50px">L</th>
                            <th style="width:50px">XL</th>
                            <th>Descripción</th>
                            <th style="width:180px">Fotos</th>
                            <th style="width:75px">Acción</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                `;

                const tbody = table.querySelector('tbody');
                items.forEach(({ product: p, globalIndex }) => {
                    if (!p.tallas) p.tallas = { S: 0, M: 0, L: 0, XL: 0 };
                    if (!p.imagenes && p.imagen) p.imagenes = [p.imagen];
                    if (!p.imagenes) p.imagenes = [];

                    let photosHtml = '<ul class="photo-list">';
                    p.imagenes.forEach((img, imgIdx) => {
                        const name = img.split('/').pop();
                        photosHtml += `
                            <li>
                                <a href="/${img}" target="_blank" title="Ver">📷 ${name}</a>
                                <span class="remove-img" onclick="removeImage(${globalIndex},${imgIdx})" title="Quitar">✕</span>
                            </li>`;
                    });
                    photosHtml += `</ul>
                        <label class="file-upload-lbl">
                            📷 Subir Foto
                            <input type="file" accept="image/*" capture="environment" onchange="uploadImage(event,${globalIndex})">
                        </label>`;

                    let catSelect = `<select onchange="updateData(${globalIndex},'categoria',this.value);setTimeout(renderTables,100)">`;
                    CATEGORIAS.forEach(c => {
                        catSelect += `<option value="${c}" ${p.categoria === c ? 'selected' : ''}>${c}</option>`;
                    });
                    catSelect += '</select>';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${p.id}</td>
                        <td>${catSelect}</td>
                        <td><input type="text" value="${p.equipo}" onchange="updateData(${globalIndex},'equipo',this.value)"></td>
                        <td><input type="number" value="${p.precio}" onchange="updateData(${globalIndex},'precio',this.value)"></td>
                        <td><input type="number" class="stock-input" value="${p.tallas.S||0}" onchange="updateStock(${globalIndex},'S',this.value)"></td>
                        <td><input type="number" class="stock-input" value="${p.tallas.M||0}" onchange="updateStock(${globalIndex},'M',this.value)"></td>
                        <td><input type="number" class="stock-input" value="${p.tallas.L||0}" onchange="updateStock(${globalIndex},'L',this.value)"></td>
                        <td><input type="number" class="stock-input" value="${p.tallas.XL||0}" onchange="updateStock(${globalIndex},'XL',this.value)"></td>
                        <td><textarea onchange="updateData(${globalIndex},'descripcion',this.value)">${(p.descripcion||'').replace(/</g,'&lt;')}</textarea></td>
                        <td>${photosHtml}</td>
                        <td><button class="btn-danger" onclick="deleteProduct(${globalIndex})">Eliminar</button></td>
                    `;
                    tbody.appendChild(tr);
                });

                section.appendChild(table);
                container.appendChild(section);
            });

            if (productData.length === 0) {
                container.innerHTML = '<p>No hay productos en el inventario.</p>';
            }
        }

        function updateData(index, field, value) {
            if (field === 'precio') value = parseInt(value, 10) || 0;
            productData[index][field] = value;
        }

        function updateStock(index, size, value) {
            productData[index].tallas[size] = parseInt(value, 10) || 0;
        }

        function addProduct() {
            const nextId = productData.length > 0 ? Math.max(...productData.map(p => p.id)) + 1 : 1;
            productData.unshift({
                id: nextId,
                categoria: 'Clubes 25/26',
                equipo: 'Nueva Referencia',
                descripcion: '',
                precio: 99000,
                tallas: { S: 0, M: 0, L: 0, XL: 0 },
                imagenes: []
            });
            renderTables();
            saveData(true);
        }

        function deleteProduct(index) {
            productData.splice(index, 1);
            renderTables();
            saveData(true);
        }

        function removeImage(prodIndex, imgIndex) {
            productData[prodIndex].imagenes.splice(imgIndex, 1);
            renderTables();
            saveData(true);
        }

        function uploadImage(event, prodIndex) {
            const file = event.target.files[0];
            if (!file) return;
            const label = event.target.parentElement;
            label.innerHTML = '⏳ Comprimiendo...';
            label.style.pointerEvents = 'none';
            const reader = new FileReader();
            reader.onload = function(e) {
                const cleanName = file.name.replace(/\s+/g, '_').toLowerCase();
                fetch('/api/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: cleanName, data: e.target.result })
                })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        if (!productData[prodIndex].imagenes) productData[prodIndex].imagenes = [];
                        productData[prodIndex].imagenes.push(data.filepath);
                        renderTables();
                        saveData(true);
                    } else {
                        alert('Error: ' + data.message);
                        label.innerText = '📷 Subir Foto';
                        label.style.pointerEvents = '';
                    }
                })
                .catch(() => {
                    alert('Error subiendo imagen.');
                    label.innerText = '📷 Subir Foto';
                    label.style.pointerEvents = '';
                });
            };
            reader.readAsDataURL(file);
        }

        function saveData(silent = false) {
            const btn = document.querySelector('.btn-save');
            if (!silent) btn.innerText = 'Guardando...';
            fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(productData)
            })
            .then(r => r.json())
            .then(data => {
                if (!silent) btn.innerText = 'Guardar Cambios';
                if (data.status === 'success' && !silent) showToast();
                else if (data.status !== 'success') alert('Error guardando los datos.');
            })
            .catch(() => {
                if (!silent) btn.innerText = 'Guardar Cambios';
                alert('Error enviando la petición.');
            });
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
